<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE ADVENTURE // {{ puzzle_type | upper }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-puzzle="{{ puzzle_type }}">
    <div class="terminal-container">
        <header class="header mini-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-family: var(--font-title); color: var(--primary-color); margin-bottom: 0;">{{ puzzle_type | upper }} QUEST</h2>
            <div class="stats">
                <span>STARS: <b id="game-score">{{ score }}</b></span>
                <span>TIME: <b id="game-timer">0.0</b>s</span>
            </div>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.9rem;">GO BACK</a>
        </header>

        <main class="game-interface">
            <div class="mission-briefing">
                <h3>SPACE MISSION:</h3>
                <p id="mission-text">Getting mystery quest ready...</p>
                <div id="hint-container" class="hidden" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 2px dashed var(--secondary-color);">
                    <strong style="color: var(--accent-color);">LITTLE HINT:</strong> 
                    <span id="hint-text"></span>
                </div>
                <button id="hint-btn" class="btn" style="margin-top: 1.5rem; padding: 0.5rem 1rem; font-size: 0.9rem;">NEED A HINT?</button>
            </div>

            <div class="interaction-zone" id="interaction-zone" style="text-align: center;">
                <!-- Dynamically populated -->
            </div>

            <div class="feedback-panel hidden" id="feedback-panel">
                <span id="feedback-text"></span>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
